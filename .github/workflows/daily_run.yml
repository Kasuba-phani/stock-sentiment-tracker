name: Daily Data Update
on:
  schedule:
    - cron: "0 21 * * *"  # 9PM UTC = 4PM EST
  workflow_dispatch:       # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Ensures the bot fetches the full history to prevent sync errors
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scrapers
        run: |
          python Scraping/Webscraping.py
          python Scraping/stock_prices.py
      
      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/
          # The '|| echo' prevents crashes if there is no new data to save that day
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          # Pull latest changes from your repo first, then push the new data
          git pull --rebase origin main
          git push
