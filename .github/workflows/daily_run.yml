name: Daily Data Update
on:
  schedule:
    - cron: "0 21 * * *"  # 9PM UTC = 4PM EST
  workflow_dispatch:       # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gets full history to prevent sync issues
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          pip install pandas feedparser joblib scikit-learn transformers torch nltk yfinance
      
      - name: Run scrapers
        run: |
          python Scraping/Webscraping.py
          python Scraping/stock_prices.py
      
      # THIS REPLACES THE MANUAL GIT COMMANDS
      - name: Auto Commit and Push Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update data: ${{ github.event.repository.updated_at }}"
          file_pattern: 'data/**/*.csv'  # Only push the CSV files to be safe
